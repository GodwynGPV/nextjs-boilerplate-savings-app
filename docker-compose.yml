services:
  postgres:
    image: postgres:16-alpine
    container_name: savings_db
    environment:
      POSTGRES_USER: savings
      POSTGRES_PASSWORD: savings
      POSTGRES_DB: savings
    ports:
      - "5432:5432"
    volumes:
      - savings_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U savings -d savings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  savings_pgdata:
